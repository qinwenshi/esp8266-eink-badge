size: [240, 416]
background: white
elements:
  - type: rect
    rect: [0, 0, 240, 40]
    fill: black

  - type: text
    text: "BADGE"
    font: KingHwa_OldSong
    size: 18
    color: white
    pos: [120, 20]
    align: center

  - type: text
    text: "{{ name }}"
    font: KingHwa_OldSong
    size: 32
    color: black
    pos: [20, 80]

  - type: text
    text: "{{ title }}"
    font: KingHwa_OldSong
    size: 18
    color: red
    pos: [20, 128]

  - type: text
    text: "{{ department }}"
    font: KingHwa_OldSong
    size: 16
    color: black
    pos: [20, 162]

  - type: line
    start: [20, 188]
    end: [220, 188]
    color: red
    width: 2

  - type: text
    text: "{{ company }}"
    font: KingHwa_OldSong
    size: 14
    color: black
    pos: [20, 206]

  - type: image
    src: "{{ avatar | default('avatar.jpg') }}"
    rect: [0, 230, 240, 186]
    fit: cover
